<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  try{
    var saved = localStorage.getItem('sec-roadmap-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch(e){}
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Page not found — Security Learning Roadmap</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="theme-color" content="#111114">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
:root{ --bg:#F4F4F6; --surface:#FFFFFF; --ink:#111114; --ink-dim:#8A8A93; --accent:#1C9A5D; --line:#EEEEF1; }
html[data-theme="dark"]{
  --bg: #101012;
  --surface: #1A1A1D;
  --ink: #F2F2F0;
  --ink-dim: #9A9AA3;
  --accent: #3DDC84;
  --line: #2A2A2F;
}

*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; text-align:center; padding:24px;
}
.card{ background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:0 12px 30px rgba(20,20,43,0.06); padding:44px 36px; max-width:420px; }
.code{ font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
h1{ font-size:22px; font-weight:800; margin:0 0 10px; }
p{ font-size:14px; color:var(--ink-dim); margin:0 0 22px; line-height:1.6; }
a{ display:inline-block; background:var(--ink); color:#fff; text-decoration:none; padding:11px 22px; border-radius:999px; font-weight:700; font-size:13.5px; }

.theme-toggle{
  width:38px; height:38px; border-radius:50%;
  background:var(--surface); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow);
  color:var(--ink); flex-shrink:0; padding:0;
}
.theme-toggle svg{ width:17px; height:17px; }
.theme-toggle .icon-moon{ display:none; }
html[data-theme="dark"] .theme-toggle .icon-sun{ display:none; }
html[data-theme="dark"] .theme-toggle .icon-moon{ display:block; }
.theme-toggle.floating{ position:fixed; top:16px; right:16px; z-index:999; }
@media print{ .theme-toggle{ display:none !important; } }
</style>
</head>
<body>
<button id="themeToggle" class="theme-toggle floating" aria-label="Toggle dark mode" title="Toggle dark mode">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>

  <div class="card">
    <div class="code">404</div>
    <h1>That page moved or never existed</h1>
    <p>The link might be outdated, or mistyped. Everything in this roadmap is linked from the home page.</p>
    <a href="index.html">Back to the roadmap →</a>
  </div>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if(!btn) return;
  btn.addEventListener('click', function(){
    var html = document.documentElement;
    var current = html.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    try{ localStorage.setItem('sec-roadmap-theme', next); }catch(e){}
  });
})();
</script>
</body>
</html>
